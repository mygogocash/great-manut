name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_CONVEX_URL: https://sincere-oriole-287.convex.cloud
  NEXT_PUBLIC_CONVEX_SITE_URL: https://sincere-oriole-287.convex.site
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
  NEXT_PUBLIC_POSTHOG_UI_HOST: https://us.posthog.com
  NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: phc_UM5i50kvCKW8wTXrInMjQrFWzTplgEpTbAm44WxDuBW

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build and deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is not set — skipping Cloudflare deploy."
            exit 0
          fi
          pnpm run deploy
