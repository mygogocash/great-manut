name: Convex Deploy

on:
  push:
    branches: [preview, main]
    paths:
      - "convex/**"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GitHub forbids `secrets.*` in job/step `if:` expressions — check in-shell instead.
      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: dev:sincere-oriole-287
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::warning::CONVEX_DEPLOY_KEY is not set — skipping Convex deploy."
            exit 0
          fi
          npx convex deploy --yes

      - name: Set Convex auth site URL
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: dev:sincere-oriole-287
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::warning::CONVEX_DEPLOY_KEY is not set — skipping env sync."
            exit 0
          fi
          npx convex env set CONVEX_SITE_URL https://sincere-oriole-287.convex.site --yes
