name: Convex Deploy

on:
  push:
    branches: [preview, main]
    paths:
      - "convex/**"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.CONVEX_DEPLOY_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: dev:modest-schnauzer-996
        run: npx convex deploy --yes

      - name: Set Convex auth site URL
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: dev:modest-schnauzer-996
        run: npx convex env set CONVEX_SITE_URL https://modest-schnauzer-996.convex.site --yes
