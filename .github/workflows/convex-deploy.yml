name: Deploy Convex

on:
  push:
    branches: [main, preview]
    paths:
      - "convex/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-convex-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GitHub forbids `secrets.*` in job/step `if:` expressions — check in-shell instead.
      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: dev:sincere-oriole-287
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::warning::CONVEX_DEPLOY_KEY is not set — skipping Convex deploy."
            exit 0
          fi
          npx convex deploy --yes
