name = "great-manut-api-preview"
main = "src/index.ts"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]
account_id = "187ab61ed9dbc6e616cb23e6b95aa8f1"

[observability]
enabled = true

[vars]
APP_ENV = "preview"
APP_ORIGIN = "http://localhost:5173"
JWT_ISSUER = "great-manut"
ACCESS_TOKEN_TTL_SECONDS = "3600"

[[d1_databases]]
binding = "DB"
database_name = "great-manut-preview"
database_id = "2b34f8e8-5793-4de3-b683-a2347de17578"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "AUTH"
id = "068e8ef8254a4f0eb39e698e4e7105dc"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "great-manut-uploads-preview"

[[durable_objects.bindings]]
name = "SYNC_ROOMS"
class_name = "SyncRoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoomDurableObject"]

[env.production]
name = "great-manut-api"

[env.production.vars]
APP_ENV = "production"
APP_ORIGIN = "https://app.greatmanut.xyz"
JWT_ISSUER = "great-manut"
ACCESS_TOKEN_TTL_SECONDS = "3600"

[[env.production.d1_databases]]
binding = "DB"
database_name = "great-manut-prod"
database_id = "7ab2abcb-f876-4a35-996b-4d1a1e8c2fd1"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "AUTH"
id = "06c31f95835a4284b9a85a9e9b3003ec"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "great-manut-uploads-prod"

[[env.production.durable_objects.bindings]]
name = "SYNC_ROOMS"
class_name = "SyncRoomDurableObject"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoomDurableObject"]
