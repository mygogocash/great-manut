# Cloudflare Workers Builds — matches dashboard project "great-manut"
# Build: pnpm run build  →  opennextjs-cloudflare build (.open-next/)
# open-next.config.ts sets buildCommand to "next build" so OpenNext does not recurse.
# Deploy: npx wrangler deploy -c wrangler.deploy.toml

"$schema" = "./node_modules/wrangler/config-schema.json"
name = "great-manut"
account_id = "187ab61ed9dbc6e616cb23e6b95aa8f1"
main = ".open-next/worker.js"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "great-manut"

[images]
binding = "IMAGES"

[[r2_buckets]]
binding = "MANUT_ATTACHMENTS"
bucket_name = "manut-attachments"
preview_bucket_name = "manut-attachments-preview"

[vars]
NEXT_PUBLIC_CONVEX_URL = "https://sincere-oriole-287.convex.cloud"
NEXT_PUBLIC_CONVEX_SITE_URL = "https://sincere-oriole-287.convex.site"
NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN = "phc_UM5i50kvCKW8wTXrInMjQrFWzTplgEpTbAm44WxDuBW"
NEXT_PUBLIC_POSTHOG_HOST = "https://us.i.posthog.com"
NEXT_PUBLIC_POSTHOG_UI_HOST = "https://us.posthog.com"

[[routes]]
pattern = "app.manut.xyz"
custom_domain = true

[[routes]]
pattern = "manut.xyz"
custom_domain = true
