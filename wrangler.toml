# Cloudflare Workers Builds — matches dashboard project "great-manut"
# Build: pnpm run build:cf  →  opennextjs-cloudflare build (.open-next/)
# Note: "build" is next build only — OpenNext invokes it internally; do not point Workers Builds at "build".
# Deploy: npx wrangler deploy

"$schema" = "./node_modules/wrangler/config-schema.json"
name = "great-manut"
main = ".open-next/worker.js"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "great-manut"

[images]
binding = "IMAGES"
