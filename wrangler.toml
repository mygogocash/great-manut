# Cloudflare Workers Builds — matches dashboard project "great-manut"
# Build: pnpm run build  →  opennextjs-cloudflare build (.open-next/)
# open-next.config.ts sets buildCommand to "next build" so OpenNext does not recurse.
# Deploy: npx wrangler deploy

"$schema" = "./node_modules/wrangler/config-schema.json"
name = "great-manut"
main = ".open-next/worker.js"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "great-manut"

[images]
binding = "IMAGES"

# Durable Object migration chain for reusing the great-manut worker name after
# replacing the old API with OpenNext. v0 matches the previously deployed class;
# v1 removes it so the Next.js worker can publish.
[[migrations]]
tag = "v0-sync-room"
new_sqlite_classes = ["SyncRoomDurableObject"]

[[migrations]]
tag = "v1-vector-opennext"
deleted_classes = ["SyncRoomDurableObject"]
