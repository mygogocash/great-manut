# Cloudflare Workers Builds — deploy from monorepo root (see deploy.sh / pnpm run deploy).
# Local dev still uses packages/api/wrangler.toml (staging defaults).
#
# Branch mapping (scripts/cloudflare-deploy.sh):
#   main    → top-level env (production Worker)
#   preview → --env staging

name = "great-manut-api"
main = "packages/api/src/index.ts"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]
account_id = "187ab61ed9dbc6e616cb23e6b95aa8f1"

[observability]
enabled = true

[vars]
APP_ENV = "production"
APP_ORIGIN = "https://app.greatmanut.xyz"
JWT_ISSUER = "great-manut"
ACCESS_TOKEN_TTL_SECONDS = "3600"

[[d1_databases]]
binding = "DB"
database_name = "great-manut-prod"
database_id = "00000000-0000-0000-0000-000000000002"
migrations_dir = "packages/api/migrations"

[[kv_namespaces]]
binding = "AUTH"
id = "00000000000000000000000000000002"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "great-manut-uploads-prod"

[[durable_objects.bindings]]
name = "SYNC_ROOMS"
class_name = "SyncRoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoomDurableObject"]

[env.staging]
name = "great-manut-api-preview"

[env.staging.vars]
APP_ENV = "preview"
APP_ORIGIN = "http://localhost:5173"
JWT_ISSUER = "great-manut"
ACCESS_TOKEN_TTL_SECONDS = "3600"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "great-manut-preview"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "packages/api/migrations"

[[env.staging.kv_namespaces]]
binding = "AUTH"
id = "00000000000000000000000000000001"

[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "great-manut-uploads-preview"

[[env.staging.durable_objects.bindings]]
name = "SYNC_ROOMS"
class_name = "SyncRoomDurableObject"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoomDurableObject"]
