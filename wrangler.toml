# Cloudflare Workers Builds — matches dashboard project "great-manut"
# Build: pnpm run build  →  opennextjs-cloudflare build (.open-next/)
# open-next.config.ts sets buildCommand to "next build" so OpenNext does not recurse.
# Deploy: npx wrangler deploy

"$schema" = "./node_modules/wrangler/config-schema.json"
name = "great-manut"
main = ".open-next/worker.js"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "great-manut"

[images]
binding = "IMAGES"

# Remove Durable Object class from the previous Great Manut API worker so the
# OpenNext bundle can deploy to the same script name.
[[migrations]]
tag = "v1-vector-opennext"
deleted_classes = ["SyncRoomDurableObject"]
