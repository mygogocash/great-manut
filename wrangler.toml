# Cloudflare Workers Builds — preview deploys to vector-preview (clean worker).
# The legacy great-manut worker still has Durable Objects from the old API;
# delete that script in the Cloudflare dashboard or run a one-time DO migration
# before reusing the great-manut name for production.
# Build: pnpm run build  →  opennextjs-cloudflare build (.open-next/)
# open-next.config.ts sets buildCommand to "next build" so OpenNext does not recurse.
# Deploy: npx wrangler deploy

"$schema" = "./node_modules/wrangler/config-schema.json"
name = "vector-preview"
main = ".open-next/worker.js"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "vector-preview"

[images]
binding = "IMAGES"
